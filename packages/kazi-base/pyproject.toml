[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kazi-base"
version = "0.1.1"
description = "Core registry, configuration, and LLM abstractions for kazi"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
keywords = ["ai", "agents", "orchestration", "kazi"]

dependencies = [
    "pyyaml>=6.0",
    "anyio>=4.0.0",
    "httpx>=0.27.0",
    "opentelemetry-api>=1.27.0",
    "opentelemetry-sdk>=1.27.0",
]

[project.optional-dependencies]
openai = ["langchain-openai>=0.2.0", "openai>=1.50.0"]
anthropic = ["langchain-anthropic>=0.2.0", "anthropic>=0.36.0"]
google = ["langchain-google-genai>=2.0.0", "google-generativeai>=0.8.0"]
local = ["langchain-ollama>=0.2.0"]

[tool.hatch.build.targets.wheel]
packages = ["kazi"]
