[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kazi-mcp"
version = "0.1.0"
description = "MCP protocol integration and built-in tools for kazi"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
keywords = ["ai", "mcp", "tools", "kazi"]

dependencies = [
    "kazi-base>=0.1.0",
    "mcp>=1.0.0",
    "httpx>=0.27.0",
]

[project.optional-dependencies]
web-search = ["duckduckgo-search>=6.0.0"]
database = ["sqlalchemy>=2.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["kazi"]
