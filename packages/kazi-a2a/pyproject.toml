[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kazi-a2a"
version = "0.1.0"
description = "Google A2A agent delegation protocol for kazi"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
keywords = ["ai", "a2a", "agents", "delegation", "kazi"]

dependencies = [
    "kazi-base>=0.1.0",
    "httpx>=0.27.0",
]

[tool.hatch.build.targets.wheel]
packages = ["kazi"]
