[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kazi-rag"
version = "0.1.0"
description = "LlamaIndex RAG integration for kazi"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
keywords = ["ai", "rag", "llamaindex", "kazi"]

dependencies = [
    "kazi-base>=0.1.0",
    "llama-index-core>=0.11.0",
]

[project.optional-dependencies]
openai = ["llama-index-llms-openai>=0.2.0", "llama-index-embeddings-openai>=0.2.0"]
anthropic = ["llama-index-llms-anthropic>=0.2.0"]
rerank = ["llama-index-postprocessor-cohere-rerank>=0.2.0", "cohere>=5.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["kazi"]
