[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kazi-voice"
version = "0.1.0"
description = "Real-time voice I/O for kazi — STT, TTS, and cross-modal memory"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
keywords = ["ai", "voice", "stt", "tts", "whisper", "elevenlabs", "kazi"]

dependencies = [
    "kazi-base>=0.1.0",
]

[project.optional-dependencies]
openai = [
    "openai>=1.50.0",
]
deepgram = [
    "deepgram-sdk>=3.0.0",
]
elevenlabs = [
    "elevenlabs>=1.0.0",
]
all = ["kazi-voice[openai,deepgram,elevenlabs]"]

[tool.hatch.build.targets.wheel]
packages = ["kazi"]
